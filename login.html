<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<button id="btnLogin">Entrar com GitHub</button>

<script type="module">
  import { createClient } 
    from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

  const supabase = createClient(
    "https://fhjfjmmkyeslnnuyipeg.supabase.co",
    "SUA_ANON_PUBLIC_KEY_AQUI"
  );

  document.getElementById("btnLogin").onclick = async () => {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: "github",
      options: {
        redirectTo: "https://contratos.overinfotec.com.br/gestao_contratos_ti.html"
      }
    });

    if (error) {
      alert(error.message);
      console.error(error);
    }
  };
</script>

</body>
</html>
